<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <div class="card">
            <div class=" box">
                <img src="./rest.avif" alt="restaurant Photo" class="image" height="400px" width="400px"> 
            </div>

            <div class="restaurantname ">

                <div class="name box">
                    Ce La Vie Kitchen & Bar
                </div>
                <div class="rating box">
                    4.3*
                </div>

            </div>

            <div class="location">
                <div class="place box">
                    North Indian, Mediterrane CP
                </div>
                <div class="price box">
                    3,300 for two
                </div>
            </div>

            <div class="open">
                <div class="opening box">
                    Opens at 12noon
                </div>
                <div class="distance box">
                    1.4 km
                </div>
            </div>

        </div>
    </main>
</body>
</html>
